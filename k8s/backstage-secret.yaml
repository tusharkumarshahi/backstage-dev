# This secret is created at deploy time by the build-push-deploy workflow.
# It injects GITHUB_TOKEN from GitHub repo secrets — never commit real tokens here.
#
# To create manually for debugging:
#   kubectl create secret generic backstage-secrets \
#     --from-literal=GITHUB_TOKEN=<your-pat> \
#     -n backstage
#
# Uncomment SSO fields when Azure SSO credentials are available:
#   --from-literal=AUTH_MICROSOFT_CLIENT_ID=<id>
#   --from-literal=AUTH_MICROSOFT_CLIENT_SECRET=<secret>
#   --from-literal=AUTH_MICROSOFT_TENANT_ID=<tenant>
