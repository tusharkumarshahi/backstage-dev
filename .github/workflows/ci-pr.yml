name: Backstage CI (PR)

on:
  pull_request:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backstage bundle in node container
        working-directory: backstage
        run: |
          docker run --rm \
            -v "$PWD":/app \
            -w /app \
            -e HOME=/tmp \
            -e COREPACK_HOME=/tmp/corepack \
            -e XDG_CACHE_HOME=/tmp/.cache \
            --user "$(id -u):$(id -g)" \
            node:24-slim \
            sh -c "corepack prepare yarn@4.4.1 --activate && corepack yarn install --frozen-lockfile && corepack yarn tsc && corepack yarn build:backend"

      - name: Build Docker image (no push)
        working-directory: backstage
        run: |
          docker buildx build . \
            -f packages/backend/Dockerfile \
            --tag backstage:pr-${{ github.event.pull_request.number }} \
            --load
