name: Setup K8s Base Resources

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v5
        with:
          cluster-name: k8s-20-npe-cicd-02
          resource-group: rg-20-npe-k8s-01

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create Backstage secrets
        run: |
          kubectl create secret generic backstage-secrets \
            --from-literal=GITHUB_TOKEN=${{ secrets.BACKSTAGE_GITHUB_TOKEN }} \
            -n backstage \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply postgres resources
        run: |
          kubectl apply -f k8s/postgres-secret.yaml
          kubectl apply -f k8s/postgres-storage.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml

      - name: Apply backstage resources
        run: |
          kubectl apply -f k8s/backstage-service.yaml
          kubectl apply -f k8s/backstage-deployment.yaml

      - name: Wait for postgres
        run: kubectl rollout status deployment/postgres -n backstage --timeout=120s

      - name: Show resources
        if: always()
        run: kubectl get all -n backstage
