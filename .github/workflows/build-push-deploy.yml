name: Backstage Build, Push & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-push-deploy:
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build backstage bundle in node container
        working-directory: backstage
        run: |
          docker run --rm \
            -v "$PWD":/app \
            -w /app \
            -e HOME=/tmp \
            -e COREPACK_HOME=/tmp/corepack \
            -e XDG_CACHE_HOME=/tmp/.cache \
            --user "$(id -u):$(id -g)" \
            node:24-slim \
            sh -c "corepack prepare yarn@4.4.1 --activate && corepack yarn install --frozen-lockfile && corepack yarn tsc && corepack yarn build:backend"

      - name: Build image
        working-directory: backstage
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          docker buildx build . \
            -f packages/backend/Dockerfile \
            --platform linux/amd64 \
            --tag $ACR_LOGIN_SERVER/backstage:$IMAGE_TAG \
            --tag $ACR_LOGIN_SERVER/backstage:latest \
            --load

